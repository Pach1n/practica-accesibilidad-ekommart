<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Iniciales en SVG</title>
  <desc id="desc">Grafico SVG con ovalo en degradado y las iniciales IV.</desc>
  <defs>
    <linearGradient id="ovalGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#ececec"/>
  <ellipse cx="600" cy="400" rx="270" ry="175" fill="url(#ovalGradient)" filter="url(#softShadow)"/>
  <text
    x="600"
    y="435"
    text-anchor="middle"
    font-family="Verdana, Arial, sans-serif"
    font-size="130"
    letter-spacing="8"
    fill="#ffffff"
  >
    IV
  </text>
</svg>
